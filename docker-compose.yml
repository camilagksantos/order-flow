services:
  mysql:
    image: mysql:8.0
    container_name: order-flow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orderflow
      MYSQL_USER: orderflow
      MYSQL_PASSWORD: orderflow
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: order-flow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  mailhog:
    image: jcalonso/mailhog
    container_name: order-flow-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
